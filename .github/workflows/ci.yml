name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-auth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Subir Auth Service e Banco
        run: docker compose -f infra/docker-compose.yml up -d --build auth-service db

      - name: Aguardar PostgreSQL
        run: |
          until docker compose -f infra/docker-compose.yml exec -T db pg_isready -U admin -d academic_db; do
            echo "Aguardando PostgreSQL..."
            sleep 2
          done

      - name: Executar testes do Auth Service
        run: docker compose -f infra/docker-compose.yml exec -T auth-service pytest

  test-academic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Subir DB e Auth
        run: docker compose -f infra/docker-compose.yml up -d --build db auth-service

      - name: Aguardar PostgreSQL
        run: |
          until docker compose -f infra/docker-compose.yml exec -T db pg_isready -U admin -d academic_db; do
            echo "Aguardando PostgreSQL..."
            sleep 2
          done

      - name: Subir Academic Service
        run: docker compose -f infra/docker-compose.yml up -d --build academic-service

      - name: Verificar containers
        run: docker compose -f infra/docker-compose.yml ps

      - name: Logs do Academic Service
        run: docker compose -f infra/docker-compose.yml logs academic-service

      - name: Executar testes do Academic Service
        run: docker compose -f infra/docker-compose.yml exec -T academic-service pytest

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  publish-images:
    if: github.event_name == 'push'

    needs:
      - test-auth
      - test-academic
      - test-frontend

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          push: true
          tags: ghcr.io/laura-kida/auth-service:latest

      - name: Build and Push Academic Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/academic-service
          push: true
          tags: ghcr.io/laura-kida/academic-service:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/laura-kida/frontend:latest